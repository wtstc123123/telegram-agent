version: "3.9"

services:
  api:
    build: .
    container_name: telegram_ai_agent_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./:/app

  redis:
    image: redis:7-alpine
    container_name: telegram_ai_agent_redis
    ports:
      - "6379:6379"
